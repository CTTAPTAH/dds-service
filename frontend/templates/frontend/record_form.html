{% extends "frontend/base.html" %}

{% block title %}Запись ДДС{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0" id="form-title">Новая запись</h5>
            </div>
            <div class="card-body">
                <form id="record-form">
                    <div class="mb-3">
                        <label class="form-label">Дата <span class="text-danger">*</span></label>
                        <input type="date" id="field-date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Статус <span class="text-danger">*</span></label>
                        <select id="field-status" class="form-select" required>
                            <option value="">— выберите —</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Тип операции <span class="text-danger">*</span></label>
                        <select id="field-type" class="form-select" required>
                            <option value="">— выберите —</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Категория <span class="text-danger">*</span></label>
                        <select id="field-category" class="form-select" required>
                            <option value="">— сначала выберите тип —</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Подкатегория <span class="text-danger">*</span></label>
                        <select id="field-subcategory" class="form-select" required>
                            <option value="">— сначала выберите категорию —</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Сумма <span class="text-danger">*</span></label>
                        <input type="number" id="field-amount" class="form-control"
                               step="100" min="100" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Комментарий</label>
                        <textarea id="field-comment" class="form-control" rows="3"></textarea>
                    </div>

                    <!-- Ошибки валидации -->
                    <div id="form-errors" class="alert alert-danger d-none"></div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                        <a href="/" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // id записи берём из URL если редактируем, иначе null
    const RECORD_ID = {{ pk|default:"null" }};
</script>
<script src="/static/frontend/js/record_form.js"></script>
{% endblock %}
