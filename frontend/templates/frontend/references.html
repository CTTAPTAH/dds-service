{% extends "frontend/base.html" %}

{% block title %}Справочники{% endblock %}

{% block content %}
<h4 class="mb-4">Управление справочниками</h4>

<div class="row g-4">

    <!-- Статусы -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Статусы</span>
                <button class="btn btn-sm btn-success" onclick="openModal('status')">+ Добавить</button>
            </div>
            <div class="card-body p-0">
                <table class="table table-sm mb-0">
                    <tbody id="list-status"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Типы операций -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Типы операций</span>
                <button class="btn btn-sm btn-success" onclick="openModal('transaction-type')">+ Добавить</button>
            </div>
            <div class="card-body p-0">
                <table class="table table-sm mb-0">
                    <tbody id="list-transaction-type"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Категории -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Категории</span>
                <button class="btn btn-sm btn-success" onclick="openModal('category')">+ Добавить</button>
            </div>
            <div class="card-body p-0">
                <table class="table table-sm mb-0">
                    <tbody id="list-category"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Подкатегории -->
    <div class="col-md-6">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Подкатегории</span>
                <button class="btn btn-sm btn-success" onclick="openModal('subcategory')">+ Добавить</button>
            </div>
            <div class="card-body p-0">
                <table class="table table-sm mb-0">
                    <tbody id="list-subcategory"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<!-- Модальное окно для добавления/редактирования -->
<div class="modal fade" id="refModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modal-title">Добавить</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="modal-fields"></div>
                <div id="modal-errors" class="alert alert-danger d-none mt-2"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-primary" onclick="saveItem()">Сохранить</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/frontend/js/references.js"></script>
{% endblock %}
